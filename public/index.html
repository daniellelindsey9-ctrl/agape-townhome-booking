<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agape Property Management — Book a Townhome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #241b16;
    --ink-soft: #5c554d;
    --olive: #3f4a33;
    --olive-dark: #2c3423;
    --olive-light: #e7e9de;
    --paper: #f5f1ea;
    --card: #ffffff;
    --line: #e2ddd0;
    --green: #4a7856;
    --green-bg: #eaf2ec;
    --amber: #b8863a;
    --amber-bg: #faf1e0;
    --red: #a3403a;
    --red-bg: #f7e8e6;
    --radius: 10px;
    --serif: 'Playfair Display', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--paper);
    color: var(--ink);
    line-height: 1.5;
  }
  .app { max-width: 960px; margin: 0 auto; padding: 0 0 3rem; }

  .topnav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--line);
    background: var(--card);
  }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 15px; letter-spacing: 0.2px; }
  .brand img { height: 30px; width: auto; display: block; }
  .modeToggle { display: flex; gap: 6px; }
  .modeToggle button {
    font-size: 12px; padding: 7px 12px; border-radius: 20px; border: 1px solid var(--line);
    background: var(--card); color: var(--ink-soft); cursor: pointer; font-family: var(--sans);
  }
  .modeToggle button.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .stepper { display: flex; gap: 4px; padding: 16px 20px 0; overflow-x: auto; }
  .step {
    flex: 1; min-width: 78px; text-align: center; font-size: 10.5px; color: var(--ink-soft);
    padding-bottom: 10px; border-bottom: 3px solid var(--line); text-transform: uppercase; letter-spacing: 0.4px;
  }
  .step.done { border-color: var(--olive); color: var(--olive-dark); font-weight: 600; }
  .step.current { border-color: var(--ink); color: var(--ink); font-weight: 600; }

  .screen { padding: 24px 20px; }
  h1 { font-family: var(--serif); font-size: 28px; font-weight: 600; margin: 0 0 6px; letter-spacing: 0.2px; }
  h2 { font-family: var(--serif); font-size: 20px; font-weight: 600; margin: 0 0 10px; }
  .sub { color: var(--ink-soft); font-size: 14px; margin: 0 0 20px; }

  .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }

  .propGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  @media (max-width: 640px) { .propGrid { grid-template-columns: 1fr; } }
  .propCard {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden;
    cursor: pointer; transition: box-shadow .15s, transform .15s; position: relative;
  }
  .propCard:hover { box-shadow: 0 4px 16px rgba(36,27,22,0.08); transform: translateY(-1px); }
  .propCard.selected { outline: 2px solid var(--olive); }
  .propCard.disabled { cursor: not-allowed; opacity: 0.6; }
  .propPhoto {
    height: 140px; background: linear-gradient(135deg, #e9e3d5, #d8cfba);
    display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 12px; position: relative;
  }
  .badge { position: absolute; top: 10px; left: 10px; background: var(--olive); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .propBody { padding: 14px; }
  .propName { font-family: var(--serif); font-weight: 600; font-size: 17px; margin-bottom: 2px; }
  .propMeta { font-size: 12px; color: var(--ink-soft); margin-bottom: 8px; }
  .propPrice { font-size: 15px; font-weight: 600; color: var(--olive-dark); }
  .propPrice span { font-size: 11px; font-weight: 400; color: var(--ink-soft); }
  .amenityRow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .pill { font-size: 10.5px; background: var(--olive-light); color: var(--olive-dark); padding: 3px 8px; border-radius: 20px; }
  .pill.touch { background: var(--amber-bg); color: var(--amber); }

  label { display: block; font-size: 12.5px; color: var(--ink-soft); margin: 12px 0 5px; font-weight: 500; }
  label:first-child { margin-top: 0; }
  input[type=text], input[type=email], input[type=tel], input[type=date], input[type=number], select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
    font-size: 14px; background: #fff; color: var(--ink); font-family: var(--sans);
  }
  textarea { resize: vertical; min-height: 70px; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--olive); box-shadow: 0 0 0 3px rgba(63,74,51,0.12); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .toggleRow { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-top: 1px solid var(--line); }
  .toggleRow:first-child { border-top: none; }
  .toggleRow .txt { font-size: 13.5px; }
  .toggleRow .txt .d { font-size: 12px; color: var(--ink-soft); }
  .switch { position: relative; width: 42px; height: 24px; background: var(--line); border-radius: 20px; cursor: pointer; flex-shrink: 0; }
  .switch.on { background: var(--olive); }
  .switch .knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: left .15s; }
  .switch.on .knob { left: 21px; }

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--sans); }
  .btn-primary { background: var(--ink); color: #fff; }
  .btn-primary:hover { background: #362a22; }
  .btn-secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
  .btn-secondary:hover { background: #f5f3ee; }
  .btn-danger { background: #fff; color: var(--red); border: 1px solid var(--red-bg); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-block { width: 100%; }
  .btn-sm { padding: 7px 12px; font-size: 12.5px; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btnRow { display: flex; gap: 10px; margin-top: 20px; }

  .summaryLine { display: flex; justify-content: space-between; font-size: 13.5px; padding: 6px 0; }
  .summaryLine.total { border-top: 1px solid var(--line); margin-top: 8px; padding-top: 10px; font-weight: 600; font-size: 15px; }
  .summaryLine .muted { color: var(--ink-soft); }
  .summaryLine .tag { font-size: 10.5px; background: var(--amber-bg); color: var(--amber); padding: 1px 7px; border-radius: 10px; margin-left: 6px; }

  .checklist { list-style: none; padding: 0; margin: 0; }
  .checklist li { display: flex; gap: 10px; align-items: flex-start; padding: 8px 0; font-size: 13.5px; }
  .checklist .num { width: 20px; height: 20px; border-radius: 50%; background: var(--olive-light); color: var(--olive-dark); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  .uploadBox { border: 1.5px dashed var(--line); border-radius: 10px; padding: 24px; text-align: center; color: var(--ink-soft); font-size: 13px; cursor: pointer; background: #fdfcfa; }
  .uploadBox.filled { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }

  .leaseBox { border: 1px solid var(--line); border-radius: 8px; padding: 16px; font-size: 12.5px; color: var(--ink-soft); max-height: 180px; overflow-y: auto; background: #fdfcfa; margin-bottom: 14px; }
  .leaseBox p { margin: 0 0 8px; }
  .sigBox { border: 1px solid var(--line); border-radius: 8px; height: 70px; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); font-size: 13px; font-style: italic; background: #fff; cursor: text; }
  .sigBox.signed { font-family: var(--serif); font-style: italic; font-size: 24px; color: var(--ink); border-color: var(--olive); }

  .confirmHero { text-align: center; padding: 20px 0 8px; }
  .checkCircle { width: 56px; height: 56px; border-radius: 50%; background: var(--olive-light); color: var(--olive-dark); display: flex; align-items: center; justify-content: center; font-size: 28px; margin: 0 auto 14px; }

  .statGrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 18px; }
  @media (max-width: 640px) { .statGrid { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
  .stat .label { font-size: 11.5px; color: var(--ink-soft); margin-bottom: 4px; }
  .stat .value { font-family: var(--serif); font-size: 22px; font-weight: 600; }

  table.admin { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.admin th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--ink-soft); padding: 8px 10px; border-bottom: 1px solid var(--line); }
  table.admin td { padding: 10px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  .statusTag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
  .statusTag.confirmed { background: var(--green-bg); color: var(--green); }
  .statusTag.pending { background: var(--amber-bg); color: var(--amber); }
  .statusTag.occupied { background: var(--olive-light); color: var(--olive-dark); }
  .statusTag.available { background: var(--green-bg); color: var(--green); }

  .miniLabel { font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--ink-soft); font-weight: 600; margin-bottom: 8px; }
  .cardHead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }

  .modalWrap { min-height: 100vh; background: rgba(36,27,22,0.5); display: flex; align-items: flex-start; justify-content: center; padding: 40px 16px; position: fixed; inset: 0; z-index: 50; overflow-y: auto; }
  .modal { background: var(--card); border-radius: 14px; width: 100%; max-width: 480px; padding: 22px; }
  .modalHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .xbtn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--ink-soft); }

  .extendBox { border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .extendBox.active { border-color: var(--olive); background: var(--olive-light); }
  .extendBox .t { font-weight: 600; font-size: 14px; }
  .extendBox .d { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

  .touchNote { display: flex; gap: 10px; align-items: flex-start; background: var(--olive-light); border-radius: var(--radius); padding: 14px; font-size: 12.5px; color: var(--olive-dark); margin-top: 10px; }
</style>
</head>

const WEEKLY_RATE = 850;
const PARTIAL_DAY_RATE = 200;
const CLEANING_UNDER_2WK = 150;
const CLEANING_2WK_PLUS = 220;
const PET_FEE = 150;
const PET_CLEAN_ADDON = 100;

const INITIAL_PROPERTIES = [
  { id: 1, name: "The Cedar Townhome", area: "Uptown Dallas", beds: 4, baths: 3, sqft: 2100,
    amenities: ["Full kitchen", "In-unit laundry", "Fenced yard", "Parking x2"], status: "available" },
  { id: 2, name: "The Magnolia Townhome", area: "Bishop Arts District", beds: 4, baths: 3.5, sqft: 2250,

  { id: 3, name: "The Sycamore Townhome", area: "Lake Highlands", beds: 4, baths: 3, sqft: 1980,

  { id: 4, name: "The Preston Townhome", area: "Preston Hollow", beds: 4, baths: 3.5, sqft: 2300,

];

const STEPS = ["Browse", "Dates", "Details", "Payment", "Lease", "ID", "Confirmed"];

function daysBetween(a, b) {
  if (!a || !b) return 0;
  const d1 = new Date(a), d2 = new Date(b);
  return Math.max(0, Math.round((d2 - d1) / (1000*60*60*24)));
}
function fullWeeks(nights) { return Math.floor(nights / 7); }
function extraDays(nights) { return nights % 7; }

// core pricing function used at booking AND at extension time
function priceStay(nights, hasPet) {
  const weeks = fullWeeks(nights);
  const days = extraDays(nights);
  const weekCost = weeks * WEEKLY_RATE;
  const dayCost = days * PARTIAL_DAY_RATE;
  const cleaningFee = nights >= 14 ? CLEANING_2WK_PLUS : CLEANING_UNDER_2WK;
  const petFee = hasPet ? PET_FEE : 0;
  const petCleanAddon = hasPet ? PET_CLEAN_ADDON : 0;
  const total = weekCost + dayCost + cleaningFee + petFee + petCleanAddon;
  return { weeks, days, weekCost, dayCost, cleaningFee, petFee, petCleanAddon, total };
}

function money(n) { return "$" + n.toLocaleString(); }

function GuestFlow() {
  const [step, setStep] = useState(0);
  const [propertyId, setPropertyId] = useState(null);
  const [properties, setProperties] = useState(INITIAL_PROPERTIES);

  React.useEffect(() => {
    fetch('/.netlify/functions/properties')
      .then(r => r.json())
      .then(data => { if (Array.isArray(data) && data.length) setProperties(data); })
      .catch(() => {});
  }, []);
  const [checkIn, setCheckIn] = useState("");
  const [checkOut, setCheckOut] = useState("");
  const [guest, setGuest] = useState({ name: "", email: "", phone: "", guests: "2" });
  const [hasPet, setHasPet] = useState(false);
  const [signed, setSigned] = useState(false);
  const [idUploaded, setIdUploaded] = useState(false);
  const [pastCleaningTriggered, setPastCleaningTriggered] = useState(false);

  // extend-stay modal state
  const [showExtend, setShowExtend] = useState(false);
  const [extendChoice, setExtendChoice] = useState(null);
  const [extendPaid, setExtendPaid] = useState(false);
  const [currentNights, setCurrentNights] = useState(0);

  const property = properties.find(p => p.id === propertyId);
  const nights = daysBetween(checkIn, checkOut);
  const pricing = priceStay(nights, hasPet);

  function goto(n) { setStep(n); window.scrollTo({top:0, behavior:"smooth"}); }

  function confirmBooking() {
    setCurrentNights(nights);
    fetch('/.netlify/functions/bookings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        propertyId, propertyName: property.name,
        guestName: guest.name, guestEmail: guest.email, guestPhone: guest.phone,
        checkIn, checkOut, nights, hasPet, total: pricing.total
      })
    }).catch(() => {});
    goto(6);
  }

  // extension pricing: 1-6 days = flat partial rate, 7+ = full weeks at weekly rate
  function extensionCost(addNights) {
    const addWeeks = fullWeeks(addNights);
    const addDays = extraDays(addNights);
    const cost = addWeeks * WEEKLY_RATE + addDays * PARTIAL_DAY_RATE;
    const newTotalNights = currentNights + addNights;
    const crossesCleaningThreshold = currentNights < 14 && newTotalNights >= 14;
    const cleaningTrigger = crossesCleaningThreshold ? CLEANING_2WK_PLUS : 0;
    return { addWeeks, addDays, cost, cleaningTrigger, total: cost + cleaningTrigger, newTotalNights };
  }

  const extendOptions = [
    { label: "Add 3 days", nights: 3 },
    { label: "Add 1 week", nights: 7 },
    { label: "Add 2 weeks", nights: 14 },
  ];

  return h('div', {className:"app"},
    h('div', {className:"topnav"},
      h('div', {className:"brand"},
        h('img',{src:LOGO_SRC, alt:"Agape Property Management"}),
        h('span', {style:{color:"var(--olive-dark)", fontFamily:"var(--serif)", fontSize:"17px", fontWeight:600, letterSpacing:"0.2px"}}, "Agape Property Management")
      )
    ),
    step < 6 && h('div', {className:"stepper"},
      STEPS.slice(0,7).map((s,i) => h('div', {
        key:s, className: "step " + (i < step ? "done" : i === step ? "current" : "")
      }, s))
    ),
    h('div', {className:"screen"},

      step === 0 && h(React.Fragment, null,
        h('h1', null, "Available townhomes"),
        h('p', {className:"sub"}, "Fully furnished 4-bedroom townhomes. ", money(WEEKLY_RATE), "/week, any length of stay from 1 week to 6 months."),
        h('div', {className:"propGrid"},
          properties.map(p => h('div', {
            key: p.id,
            className: "propCard" + (propertyId === p.id ? " selected" : "") + (p.status !== "available" ? " disabled" : ""),
            onClick: () => p.status === "available" && setPropertyId(p.id)
          },
            h('div', {className:"propPhoto"},
              p.status === "occupied" && h('div',{className:"badge", style:{background:"var(--amber-bg)", color:"var(--amber)"}}, "Occupied"),
              p.status === "available" && h('div',{className:"badge"}, "Available now"),
              "Photo gallery — " + p.name
            ),
            h('div', {className:"propBody"},
              h('div', {className:"propName"}, p.name),
              h('div', {className:"propMeta"}, p.area + " · " + p.beds + " bed · " + p.baths + " bath · " + p.sqft + " sqft"),
              h('div', {className:"propPrice"}, money(WEEKLY_RATE), h('span',null," / week")),
              h('div', {className:"amenityRow"},
                p.amenities.map(a => h('span',{key:a, className:"pill"}, a)),
                h('span', {className:"pill touch"}, "The Agape Touch")
              )
            )
          ))
        ),
        h('div', {className:"touchNote"},
          h('span', null, "✦"),
          h('div', null,
            h('strong', null, "Every stay includes the Agape Touch. "),
            "Curated organic cleaning products, a signature scent, and restocked essentials — the same white-glove standard across every Agape home."
          )
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-primary btn-block", disabled: !propertyId, onClick: () => goto(1)}, "Continue to dates")
        )
      ),

      step === 1 && h(React.Fragment, null,
        h('h1', null, "Choose your stay length"),
        h('p', {className:"sub"}, property.name + " · " + property.area),
        h('div', {className:"card"},
          h('div', {className:"row2"},
            h('div', null, h('label', null, "Check-in"), h('input', {type:"date", value:checkIn, onChange:e=>setCheckIn(e.target.value)})),
            h('div', null, h('label', null, "Check-out"), h('input', {type:"date", value:checkOut, min:checkIn, onChange:e=>setCheckOut(e.target.value)}))
          ),
          h('div', {className:"toggleRow"},
            h('div', {className:"txt"}, h('div',null,"Traveling with a pet?"), h('div',{className:"d"}, "$150 non-refundable pet fee + $100 cleaning add-on")),
            h('div', {className:"switch" + (hasPet ? " on" : ""), onClick:()=>setHasPet(!hasPet)}, h('div',{className:"knob"}))
          ),
          nights > 0 && h('div', {style:{marginTop:16}},
            pricing.weeks > 0 && h('div', {className:"summaryLine"}, h('span',{className:"muted"},money(WEEKLY_RATE)+" × "+pricing.weeks+" week"+(pricing.weeks!==1?"s":"")), h('span',null,money(pricing.weekCost))),
            pricing.days > 0 && h('div', {className:"summaryLine"}, h('span',{className:"muted"},money(PARTIAL_DAY_RATE)+" × "+pricing.days+" extra day"+(pricing.days!==1?"s":"")), h('span',null,money(pricing.dayCost))),
            h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Cleaning + restock fee", h('span',{className:"tag"}, nights>=14?"2wk+":"under 2wk")), h('span',null,money(pricing.cleaningFee))),
            hasPet && h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Pet fee (non-refundable)"), h('span',null,money(pricing.petFee))),
            hasPet && h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Pet cleaning add-on"), h('span',null,money(pricing.petCleanAddon))),
            h('div', {className:"summaryLine total"}, h('span',null,"Estimated total"), h('span',null,money(pricing.total)))
          ),
          nights === 0 && h('p', {className:"sub", style:{margin:"14px 0 0"}}, "Stays from 1 week up to 6 months. Pick your dates above.")
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>goto(0)}, "Back"),
          h('button', {className:"btn btn-primary btn-block", disabled: nights < 7, onClick: () => goto(2)}, "Continue to your details")
        )
      ),

      step === 2 && h(React.Fragment, null,
        h('h1', null, "Your details"),
        h('p', {className:"sub"}, "We'll use this to prepare your check-in instructions and lease."),
        h('div', {className:"card"},
          h('label', null, "Full name"),
          h('input', {type:"text", placeholder:"Jordan Reyes", value:guest.name, onChange:e=>setGuest({...guest, name:e.target.value})}),
          h('div', {className:"row2"},
            h('div', null, h('label', null, "Email"), h('input', {type:"email", placeholder:"jordan@email.com", value:guest.email, onChange:e=>setGuest({...guest, email:e.target.value})})),
            h('div', null, h('label', null, "Phone"), h('input', {type:"tel", placeholder:"(214) 555-0148", value:guest.phone, onChange:e=>setGuest({...guest, phone:e.target.value})}))
          ),
          h('label', null, "Number of occupants"),
          h('select', {value:guest.guests, onChange:e=>setGuest({...guest, guests:e.target.value})},
            [1,2,3,4,5,6].map(n => h('option',{key:n, value:n}, n + (n===1?" guest":" guests")))
          )
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>goto(1)}, "Back"),
          h('button', {className:"btn btn-primary btn-block", disabled: !guest.name || !guest.email || !guest.phone, onClick: () => goto(3)}, "Continue to payment")
        )
      ),

      step === 3 && h(React.Fragment, null,
        h('h1', null, "Payment"),
        h('p', {className:"sub"}, "Secure your dates. Your card is charged once you confirm below."),
        h('div', {className:"card"},
          h('div', {className:"miniLabel"}, "Booking summary"),
          h('div', {className:"summaryLine"}, h('span',null,property.name), h('span',null, checkIn + " → " + checkOut)),
          pricing.weeks > 0 && h('div', {className:"summaryLine"}, h('span',{className:"muted"},money(WEEKLY_RATE)+" × "+pricing.weeks+" week"+(pricing.weeks!==1?"s":"")), h('span',null,money(pricing.weekCost))),
          pricing.days > 0 && h('div', {className:"summaryLine"}, h('span',{className:"muted"},money(PARTIAL_DAY_RATE)+" × "+pricing.days+" extra day"+(pricing.days!==1?"s":"")), h('span',null,money(pricing.dayCost))),
          h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Cleaning + restock fee"), h('span',null,money(pricing.cleaningFee))),
          hasPet && h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Pet fee (non-refundable)"), h('span',null,money(pricing.petFee))),
          hasPet && h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Pet cleaning add-on"), h('span',null,money(pricing.petCleanAddon))),
          h('div', {className:"summaryLine total"}, h('span',null,"Due now"), h('span',null,money(pricing.total)))
        ),
        h('div', {className:"card"},
          h('div', {className:"miniLabel"}, "Card details"),
          h('label', null, "Card number"),
          h('input', {type:"text", placeholder:"4242 4242 4242 4242"}),
          h('div', {className:"row2"},
            h('div', null, h('label', null, "Expiry"), h('input', {type:"text", placeholder:"MM / YY"})),
            h('div', null, h('label', null, "CVC"), h('input', {type:"text", placeholder:"123"}))
          )
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>goto(2)}, "Back"),
          h('button', {className:"btn btn-primary btn-block", onClick: () => goto(4)}, "Pay "+money(pricing.total)+" and continue")
        )
      ),

      step === 4 && h(React.Fragment, null,
        h('h1', null, "Sign your lease"),
        h('p', {className:"sub"}, "Short-term furnished lease for the length of your stay."),
        h('div', {className:"leaseBox"},
          h('p', null, h('strong',null,"Furnished short-term lease agreement")),
          h('p', null, "This agreement is between Agape Property Management (\"Landlord\") and " + (guest.name || "Guest") + " (\"Tenant\") for the property " + property.name + ", " + property.area + "."),
          h('p', null, "Term: " + checkIn + " through " + checkOut + " (" + nights + " nights)."),
          h('p', null, "Rent: " + money(WEEKLY_RATE) + " per full week; partial-week extensions billed at a flat " + money(PARTIAL_DAY_RATE) + " per day."),
          h('p', null, "A mandatory cleaning and restock fee applies: " + money(CLEANING_UNDER_2WK) + " for stays under two weeks, or " + money(CLEANING_2WK_PLUS) + " for stays of two weeks or more, charged once."),
          hasPet && h('p', null, "Pet fee: " + money(PET_FEE) + " (non-refundable), plus a " + money(PET_CLEAN_ADDON) + " pet cleaning add-on, both charged at booking."),
          h('p', null, "Total due at booking: " + money(pricing.total) + "."),
          h('p', null, "Tenant agrees to reasonable care of the furnished property and appliances, adherence to community guidelines, and reporting any maintenance issues promptly. Extensions require written approval and payment of the applicable rate prior to the current term's end."),
          h('p', null, "This is a preview of lease terms for prototype purposes only.")
        ),
        h('label', null, "Sign below to accept"),
        h('div', {className:"sigBox" + (signed ? " signed" : ""), onClick:()=>setSigned(true)},
          signed ? (guest.name || "Signed") : "Click to sign"
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>goto(3)}, "Back"),
          h('button', {className:"btn btn-primary btn-block", disabled: !signed, onClick: () => goto(5)}, "Continue to ID verification")
        )
      ),

      step === 5 && h(React.Fragment, null,
        h('h1', null, "Verify your identity"),
        h('p', {className:"sub"}, "Upload a government-issued photo ID to complete your booking."),
        h('div', {className:"uploadBox" + (idUploaded ? " filled" : ""), onClick:()=>setIdUploaded(true)},
          idUploaded ? "✓ ID uploaded — drivers_license.jpg" : "Click to upload driver's license or passport"
        ),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>goto(4)}, "Back"),
          h('button', {className:"btn btn-primary btn-block", disabled: !idUploaded, onClick: confirmBooking}, "Complete booking")
        )
      ),

      step === 6 && h(React.Fragment, null,
        h('div', {className:"confirmHero"},
          h('div', {className:"checkCircle"}, "✓"),
          h('h1', null, "You're booked"),
          h('p', {className:"sub"}, "A confirmation and check-in guide have been sent to " + guest.email)
        ),
        h('div', {className:"card"},
          h('div', {className:"miniLabel"}, "Reservation"),
          h('div', {className:"summaryLine"}, h('span',null,property.name), h('span',null, property.area)),
          h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Dates"), h('span',null, checkIn + " → " + checkOut)),
          h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Total paid"), h('span',null,money(pricing.total))),
          h('div', {className:"summaryLine"}, h('span',{className:"muted"},"Lease"), h('span',null,"Signed")),
          h('div', {className:"summaryLine"}, h('span',{className:"muted"},"ID verification"), h('span',null,"Complete"))
        ),
        h('div', {className:"card"},
          h('div', {className:"miniLabel"}, "Check-in instructions"),
          h('ul', {className:"checklist"},
            h('li',null, h('span',{className:"num"},"1"), "Arrive after 4:00 PM on " + (checkIn || "your check-in date")),
            h('li',null, h('span',{className:"num"},"2"), "Access the smart lock using code sent via text 24 hours before arrival"),
            h('li',null, h('span',{className:"num"},"3"), "Parking available in the driveway, 2-vehicle limit"),
            h('li',null, h('span',{className:"num"},"4"), "Wifi network and password are posted on the kitchen counter"),
            h('li',null, h('span',{className:"num"},"5"), "Report any issues directly through this portal for fastest response")
          )
        ),
        h('div', {className:"card"},
          h('div', {className:"miniLabel"}, "Need to extend your stay?"),
          h('p', {className:"sub", style:{margin:"0 0 12px"}}, "Extend in weekly increments at the same rate, or add a few days at a flat daily rate."),
          h('button', {className:"btn btn-secondary btn-block", onClick:()=>{setShowExtend(true); setExtendChoice(null); setExtendPaid(false);}}, "Request an extension")
        )
      )
    ),

    showExtend && h('div', {className:"modalWrap"},
      h('div', {className:"modal"},
        h('div', {className:"modalHead"},
          h('h2', {style:{margin:0}}, extendPaid ? "Extension confirmed" : "Extend your stay"),
          h('button', {className:"xbtn", onClick:()=>setShowExtend(false)}, "✕")
        ),
        !extendPaid && h(React.Fragment, null,
          h('p', {className:"sub", style:{margin:"0 0 14px"}}, "Current stay: " + currentNights + " nights. Choose how much longer you'd like to stay."),
          extendOptions.map(opt => {
            const ext = extensionCost(opt.nights);
            const isPartial = opt.nights < 7;
            return h('div', {
              key: opt.label,
              className: "extendBox" + (extendChoice===opt.nights ? " active" : ""),
              onClick: () => setExtendChoice(opt.nights)
            },
              h('div', {className:"t"}, opt.label + (isPartial ? " (daily rate)" : "")),
              h('div', {className:"d"},
                isPartial
                  ? money(PARTIAL_DAY_RATE) + "/day × " + opt.nights + " days = " + money(ext.cost)
                  : money(WEEKLY_RATE) + "/week × " + ext.addWeeks + " = " + money(ext.cost),
                ext.cleaningTrigger > 0 ? " + " + money(ext.cleaningTrigger) + " cleaning fee (crosses 2-week mark)" : ""
              )
            );
          }),
          extendChoice && h('div', {className:"card", style:{marginTop:14, marginBottom:0}},
            h('div', {className:"summaryLine total"}, h('span',null,"Extension total"), h('span',null, money(extensionCost(extendChoice).total)))
          ),
          h('div', {className:"btnRow"},
            h('button', {className:"btn btn-primary btn-block", disabled: !extendChoice, onClick: () => {
              setCurrentNights(currentNights + extendChoice);
              setExtendPaid(true);
            }}, extendChoice ? "Pay " + money(extensionCost(extendChoice).total) + " and extend" : "Select an option")
          )
        ),
        extendPaid && h(React.Fragment, null,
          h('p', {className:"sub"}, "Your stay has been extended. Updated check-out and lease amendment will be emailed to you."),
          h('div', {className:"card", style:{marginBottom:0}},
            h('div', {className:"summaryLine"}, h('span',{className:"muted"},"New total stay length"), h('span',null, currentNights + " nights"))
          ),
          h('div', {className:"btnRow"},
            h('button', {className:"btn btn-secondary btn-block", onClick:()=>setShowExtend(false)}, "Done")
          )
        )
      )
    )
  );
}

function AdminView() {
  const [properties, setProperties] = useState(INITIAL_PROPERTIES);
  const [bookings, setBookings] = useState([]);
  const [showAdd, setShowAdd] = useState(false);
  const [confirmRemove, setConfirmRemove] = useState(null);
  const [newProp, setNewProp] = useState({ name:"", area:"", beds:"4", baths:"3", sqft:"", amenities:"" });

  function loadProperties() {
    fetch('/.netlify/functions/properties')
      .then(r => r.json())
      .then(data => { if (Array.isArray(data) && data.length) setProperties(data); })
      .catch(() => {});
  }
  function loadBookings() {
    fetch('/.netlify/functions/bookings')
      .then(r => r.json())
      .then(data => { if (Array.isArray(data)) setBookings(data); })
      .catch(() => {});
  }
  React.useEffect(() => { loadProperties(); loadBookings(); }, []);
  const occupied = properties.filter(p=>p.status==="occupied").length;
  const totalRevenue = bookings.reduce((s,b)=>s+(b.total||0),0);

  function addProperty() {
    if (!newProp.name || !newProp.area) return;
    const payload = {
      name: newProp.name, area: newProp.area,
      beds: Number(newProp.beds)||4, baths: Number(newProp.baths)||3, sqft: Number(newProp.sqft)||2000,
      amenities: newProp.amenities.split(",").map(s=>s.trim()).filter(Boolean)
    };
    fetch('/.netlify/functions/properties', {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)
    }).then(() => loadProperties()).catch(() => {});
    setNewProp({ name:"", area:"", beds:"4", baths:"3", sqft:"", amenities:"" });
    setShowAdd(false);
  }

  function removeProperty(id) {
    fetch('/.netlify/functions/properties?id=' + encodeURIComponent(id), { method: 'DELETE' })
      .then(() => loadProperties()).catch(() => {});
    setConfirmRemove(null);
  }

  return h('div', {className:"app"},
    h('div', {className:"topnav"},
      h('div', {className:"brand"},
        h('img',{src:LOGO_SRC, alt:"Agape Property Management", style:{height:"26px"}}),
        h('span', {style:{color:"var(--olive-dark)", fontFamily:"var(--serif)", fontSize:"16px", fontWeight:600, letterSpacing:"0.2px"}}, "Agape Property Management"),
        h('span',{style:{color:"var(--ink-soft)", fontWeight:500}}," — Admin")
      )
    ),
    h('div', {className:"screen"},
      h('h1', null, "Property operations"),
      h('p', {className:"sub"}, properties.length + " townhomes · Weekly furnished-stay program"),
      h('div', {className:"statGrid"},
        h('div', {className:"stat"}, h('div',{className:"label"},"Homes occupied"), h('div',{className:"value"}, occupied + " / " + properties.length)),
        h('div', {className:"stat"}, h('div',{className:"label"},"Active bookings"), h('div',{className:"value"}, bookings.length)),
        h('div', {className:"stat"}, h('div',{className:"label"},"Pending review"), h('div',{className:"value"}, bookings.filter(b=>b.status==="pending").length)),
        h('div', {className:"stat"}, h('div',{className:"label"},"Booked revenue"), h('div',{className:"value"}, money(totalRevenue)))
      ),
      h('div', {className:"card"},
        h('div', {className:"miniLabel"}, "Reservations"),
        bookings.length === 0 && h('p', {className:"sub", style:{margin:0}}, "No bookings yet. They'll show up here once a guest completes the booking flow."),
        bookings.length > 0 && h('table', {className:"admin"},
          h('thead', null, h('tr', null,
            h('th',null,"Guest"), h('th',null,"Property"), h('th',null,"Dates"), h('th',null,"Nights"), h('th',null,"Total"), h('th',null,"Status")
          )),
          h('tbody', null,
            bookings.map(b => h('tr', {key:b.id},
              h('td',null,b.guestName || "—"), h('td',null,b.propertyName || "—"), h('td',null,(b.checkIn||"?") + " → " + (b.checkOut||"?")), h('td',null,b.nights || "—"),
              h('td',null,money(b.total||0)),
              h('td',null, h('span',{className:"statusTag "+(b.status==='pending_payment'?'pending':'confirmed')}, b.status || "pending"))
            ))
          )
        )
      ),
      h('div', {className:"card"},
        h('div', {className:"cardHead"},
          h('div', {className:"miniLabel", style:{margin:0}}, "Homes"),
          h('button', {className:"btn btn-secondary btn-sm", onClick:()=>setShowAdd(true)}, "+ Add property")
        ),
        h('table', {className:"admin"},
          h('thead', null, h('tr', null, h('th',null,"Property"), h('th',null,"Area"), h('th',null,"Beds/Baths"), h('th',null,"Status"), h('th',null,""))),
          h('tbody', null,
            properties.map(p => h('tr', {key:p.id},
              h('td',null,p.name), h('td',null,p.area), h('td',null,p.beds+" / "+p.baths),
              h('td',null, h('span',{className:"statusTag "+(p.status==="occupied"?"occupied":"available")}, p.status)),
              h('td',null, h('button', {className:"btn btn-danger btn-sm", onClick:()=>setConfirmRemove(p.id)}, "Remove"))
            ))
          )
        )
      )
    ),

    showAdd && h('div', {className:"modalWrap"},
      h('div', {className:"modal"},
        h('div', {className:"modalHead"},
          h('h2', {style:{margin:0}}, "Add a property"),
          h('button', {className:"xbtn", onClick:()=>setShowAdd(false)}, "✕")
        ),
        h('label', null, "Property name"),
        h('input', {type:"text", placeholder:"The Ashford Townhome", value:newProp.name, onChange:e=>setNewProp({...newProp, name:e.target.value})}),
        h('label', null, "Area / neighborhood"),
        h('input', {type:"text", placeholder:"Oak Lawn", value:newProp.area, onChange:e=>setNewProp({...newProp, area:e.target.value})}),
        h('div', {className:"row2"},
          h('div', null, h('label', null, "Bedrooms"), h('input', {type:"number", value:newProp.beds, onChange:e=>setNewProp({...newProp, beds:e.target.value})})),
          h('div', null, h('label', null, "Bathrooms"), h('input', {type:"number", step:"0.5", value:newProp.baths, onChange:e=>setNewProp({...newProp, baths:e.target.value})}))
        ),
        h('label', null, "Square footage"),
        h('input', {type:"number", placeholder:"2100", value:newProp.sqft, onChange:e=>setNewProp({...newProp, sqft:e.target.value})}),
        h('label', null, "Amenities (comma separated)"),
        h('textarea', {placeholder:"Full kitchen, In-unit laundry, Fenced yard", value:newProp.amenities, onChange:e=>setNewProp({...newProp, amenities:e.target.value})}),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary", onClick:()=>setShowAdd(false)}, "Cancel"),
          h('button', {className:"btn btn-primary btn-block", disabled: !newProp.name || !newProp.area, onClick: addProperty}, "Add property")
        )
      )
    ),

    confirmRemove && h('div', {className:"modalWrap"},
      h('div', {className:"modal", style:{maxWidth:380}},
        h('h2', null, "Remove this listing?"),
        h('p', {className:"sub"}, "This will remove " + (properties.find(p=>p.id===confirmRemove)||{}).name + " from the booking site. Existing reservations aren't affected."),
        h('div', {className:"btnRow"},
          h('button', {className:"btn btn-secondary btn-block", onClick:()=>setConfirmRemove(null)}, "Cancel"),
          h('button', {className:"btn btn-danger btn-block", onClick:()=>removeProperty(confirmRemove)}, "Remove")
        )
      )
    )
  );
}

function App() {
  const [mode, setMode] = useState("guest");
  return h(React.Fragment, null,
    h('div', {style:{display:"flex", justifyContent:"flex-end", padding:"10px 20px", background:"var(--card)", borderBottom:"1px solid var(--line)"}},
      h('div', {className:"modeToggle"},
        h('button', {className: mode==="guest"?"active":"", onClick:()=>setMode("guest")}, "Guest booking flow"),
        h('button', {className: mode==="admin"?"active":"", onClick:()=>setMode("admin")}, "Admin view")
      )
    ),
    mode === "guest" ? h(GuestFlow) : h(AdminView)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
